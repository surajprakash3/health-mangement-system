name: CI/CD — Health Management System

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # Allow manual runs from GitHub UI

# ─────────────────────────────────────────────────────────────────────────────
# Environment Variables (non-secret)
# ─────────────────────────────────────────────────────────────────────────────
env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/health-frontend
  IMAGE_BACKEND:  ${{ secrets.DOCKER_USERNAME }}/health-backend

# ─────────────────────────────────────────────────────────────────────────────
# Jobs
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: 🧪 Install & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Check backend (syntax validation)
        working-directory: backend
        run: node --check server.js

  # ── Job 2: Build Docker Images ──────────────────────────────────────────────
  build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'   # Only build on push to main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/frontend.tar

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/backend.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/*.tar
          retention-days: 1

  # ── Job 3: Push to Docker Hub ───────────────────────────────────────────────
  push:
    name: 📦 Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          docker load --input /tmp/frontend.tar
          docker load --input /tmp/backend.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag images with SHA
        run: |
          SHA=${{ github.sha }}
          SHORT_SHA=${SHA::7}
          docker tag ${{ env.IMAGE_FRONTEND }}:latest ${{ env.IMAGE_FRONTEND }}:${SHORT_SHA}
          docker tag ${{ env.IMAGE_BACKEND }}:latest  ${{ env.IMAGE_BACKEND }}:${SHORT_SHA}

      - name: Push frontend image
        run: |
          SHA=${{ github.sha }}
          SHORT_SHA=${SHA::7}
          docker push ${{ env.IMAGE_FRONTEND }}:latest
          docker push ${{ env.IMAGE_FRONTEND }}:${SHORT_SHA}

      - name: Push backend image
        run: |
          SHA=${{ github.sha }}
          SHORT_SHA=${SHA::7}
          docker push ${{ env.IMAGE_BACKEND }}:latest
          docker push ${{ env.IMAGE_BACKEND }}:${SHORT_SHA}

  # ── Job 4: Deploy to EC2 ────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production   # Requires environment protection rules in GitHub

    steps:
      - name: Checkout code (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Navigate to project directory
            cd /home/ubuntu/health-management-system

            echo "📥 Pulling latest images from Docker Hub..."
            docker compose pull

            echo "🔄 Restarting services with zero downtime..."
            docker compose up -d --remove-orphans

            echo "🧹 Cleaning up dangling images..."
            docker image prune -f

            echo "✅ Deployment complete!"
            docker compose ps
