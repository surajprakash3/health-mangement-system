version: '3.9'

services:

  frontend:

    build: ./frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

  backend:

    build: ./backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - mongodb

  mongodb:

    image: mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  nginx:

    image: nginx:latest

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - frontend
      - backend

volumes:
  mongo_data: